name: Update golf data

# Manual trigger — run it from the GitHub mobile app or website:
#   repo → Actions → "Update golf data" → Run workflow.
# It pulls your latest rounds from Garmin Connect (using the GARMIN_TOKEN_B64
# secret), rebuilds the data, and redeploys the site.
on:
  workflow_dispatch:

permissions:
  contents: write   # commit refreshed data back to the repo
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt

      - name: Fetch from Garmin, parse, export
        env:
          GARMIN_TOKEN_B64: ${{ secrets.GARMIN_TOKEN_B64 }}
          GARMIN_HEADLESS: "1"
        run: |
          python fetch_golf.py
          python parse.py
          python export_static.py

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/public/data
          git diff --staged --quiet || git commit -m "Update golf data [skip ci]"
          git push

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Build static site
        working-directory: web
        env:
          NEXT_PUBLIC_STATIC: "1"
          NEXT_PUBLIC_BASE_PATH: /garmin-golf-dashboard
        run: |
          npm install --no-audit --no-fund
          npm run build
      - run: touch web/out/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
